<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mini LinkedIn Feed - Share posts and connect with your professional network">
  <title>Mini LinkedIn - Feed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-100">
  <!-- Navbar -->
  <nav class="navbar">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <!-- Logo -->
      <a href="/feed.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-blue-700 rounded-lg flex items-center justify-center">
          <span class="text-sm font-bold text-white">in</span>
        </div>
        <span class="text-lg font-bold text-gray-800 hidden sm:block">Mini LinkedIn</span>
      </a>

      <!-- Right Side -->
      <div class="flex items-center gap-3">
        <!-- Notifications -->
        <div class="relative">
          <button id="notifBell" class="relative p-2 rounded-full hover:bg-gray-100 transition text-gray-600 hover:text-gray-900">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <span id="notifBadge" class="notif-badge hidden">0</span>
          </button>
          <!-- Notification Panel -->
          <div id="notifPanel" class="notif-panel hidden">
            <div class="sticky top-0 bg-white border-b border-gray-100 px-4 py-3 flex items-center justify-between rounded-t-xl">
              <h3 class="font-semibold text-gray-900">Notifications</h3>
              <button id="markAllRead" class="text-xs text-blue-600 font-medium hover:underline">Mark all read</button>
            </div>
            <div id="notificationList"></div>
          </div>
        </div>

        <!-- Profile Link -->
        <a href="#" id="profileLink" class="flex items-center gap-2 hover:bg-gray-100 rounded-full px-2 py-1 transition">
          <img id="navAvatar" src="" alt="Profile" class="w-8 h-8 rounded-full object-cover ring-2 ring-blue-100">
          <span id="navUserName" class="text-sm font-medium text-gray-700 hidden md:block"></span>
        </a>

        <!-- Logout -->
        <button id="logoutBtn" class="text-gray-400 hover:text-red-500 transition p-2" title="Sign out">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-2xl mx-auto px-4 py-6 page-enter">
    <!-- Create Post Card -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
      <div class="flex items-center gap-3 mb-4">
        <img id="postAvatar" src="" alt="You" class="w-12 h-12 rounded-full object-cover ring-2 ring-blue-100">
        <h2 class="text-gray-600 text-sm font-medium">What's on your mind?</h2>
      </div>
      <form id="postForm">
        <textarea id="postCaption" rows="3" placeholder="Share your thoughts, achievements, or learnings..."
                  class="form-input resize-none mb-3" required></textarea>
        
        <!-- Image Preview -->
        <div id="imagePreview" class="hidden mb-3 relative rounded-lg overflow-hidden"></div>
        <button type="button" id="removeImage" class="hidden text-red-500 text-xs font-medium mb-2 hover:underline">✕ Remove image</button>

        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <!-- Image Upload -->
            <label class="flex items-center gap-1 text-gray-500 hover:text-blue-600 cursor-pointer transition px-3 py-2 rounded-lg hover:bg-blue-50">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <span class="text-sm font-medium">Photo</span>
              <input type="file" id="postImage" accept="image/*" class="hidden">
            </label>

            <!-- AI Enhance Caption -->
            <button type="button" id="enhanceCaption" class="ai-btn">
              ✨ AI Enhance
            </button>
          </div>

          <button type="submit" class="btn-primary">
            📝 Post
          </button>
        </div>
      </form>
    </div>

    <!-- Feed -->
    <div id="feedContainer">
      <div class="flex justify-center py-8">
        <span class="loading-spinner-lg"></span>
      </div>
    </div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/feed.js"></script>

  <script>
    // Set profile link dynamically
    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      if (user) {
        document.getElementById('profileLink').href = `/profile.html?id=${user._id}`;
      }
    });
  </script>
</body>
</html>
